[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_20", "php83Extensions.gd", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.bcmath", "php83Extensions.openssl", "php83Extensions.fileinfo", "php83Extensions.zip"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction", "npm install"]

[phases.build]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
